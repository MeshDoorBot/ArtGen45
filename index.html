<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mesh Art Generator</title>
<link rel="preload" href="fonts/MeshFont.ttf" as="font" type="font/ttf" crossorigin>

<style>
*{
  box-sizing:border-box;
}

@font-face{
  font-family:'MeshFont';
  src:url('fonts/MeshFont.ttf') format('truetype');
  font-display:swap;
}

html,body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:MeshFont, system-ui, -apple-system, BlinkMacSystemFont, Inter, Arial, sans-serif;
}

body{
  display:flex;
  justify-content:center;
  min-height:100vh;
  padding:20px;
}

.container{
  width:100%;
  max-width:520px;
}

h1{
  text-align:center;
  font-size:18px;
  margin:0 0 14px;
  opacity:.7;
}

select,input,button,label{
  font-family:inherit;
}

select,input,button{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border-radius:6px;
  border:none;
  font-size:14px;
}

label{
  display:block;
  margin:0 0 6px;
  color:rgba(255,255,255,.68);
  font-size:12px;
}

.toolbar{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-bottom:10px;
}

.toolbar select{
  margin-bottom:0;
}

.editor{
  display:grid;
  gap:10px;
  margin-bottom:10px;
}

.field-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.editor input{
  margin-bottom:0;
}

button{
  background:#1db954;
  color:#fff;
  cursor:pointer;
}

button:disabled{
  cursor:not-allowed;
  opacity:.45;
}

[hidden]{
  display:none !important;
}

canvas{
  width:100%;
  height:auto;
  background:#000;
  border-radius:12px;
  margin-top:10px;
  max-height:72vh;
  object-fit:contain;
}
</style>
</head>

<body>
<div class="container">

<h1>Mesh Art Generator</h1>

<select id="showPicker" disabled>
  <option>Loading shows…</option>
</select>

<div class="toolbar">
  <select id="formatPicker">
    <option value="square">Square 1:1</option>
    <option value="story">Story 9:16</option>
  </select>
  <select id="layoutPicker">
    <option value="lower">Lower text</option>
    <option value="center">Center text</option>
  </select>
</div>

<div class="editor" hidden>
  <div>
    <label for="titleInput">Show title</label>
    <input type="text" id="titleInput" placeholder="Show title">
  </div>
  <div>
    <label for="djInput">DJ / host</label>
    <input type="text" id="djInput" placeholder="DJ / host">
  </div>
  <div class="field-grid">
    <div>
      <label for="dateInput">Date</label>
      <input type="date" id="dateInput">
    </div>
    <div>
      <label for="guestInput">Guest</label>
      <input type="text" id="guestInput" placeholder="Guest">
    </div>
  </div>
  <div class="field-grid">
    <div>
      <label for="startInput">Start</label>
      <input type="time" id="startInput">
    </div>
    <div>
      <label for="endInput">End</label>
      <input type="time" id="endInput">
    </div>
  </div>
</div>

<input type="file" id="uploadInput" accept="image/*">

<button id="editBtn" type="button" hidden aria-expanded="false">Edit info</button>

<button id="renderBtn" type="button" disabled>Generate Artwork</button>
<button id="downloadBtn" type="button" disabled>Download Art</button>

<canvas id="c" width="1080" height="1080"></canvas>

</div>

<script>
/* ===========================
   CONSTANTS
=========================== */
const SHOWS_URL = 'https://script.google.com/macros/s/AKfycbw3QgJtZXB48I0BUMpTE5Dlo2kqMReNuD4jbiEVBaB1z49bSgzEkAgixkjHxwTKRwY0/exec';

const FORMATS = {
  square: {
    label: 'square',
    width: 1080,
    height: 1080,
    safeTop: 80,
    safeBottom: 96,
    lower: { x: 96, titleY: 730, dateY: 875 },
    center: { x: 96, titleY: 545, dateY: 690 }
  },
  story: {
    label: 'story',
    width: 1080,
    height: 1920,
    safeTop: 250,
    safeBottom: 340,
    lower: { x: 96, titleY: 1240, dateY: 1390 },
    center: { x: 96, titleY: 840, dateY: 990 }
  }
};

const DJ_LINE_OFFSET = 40;
const PILL_PADDING_X = 36;
const DATE_TIME_GAP = 16;
const PILL_VERTICAL_GAP = 16;
const SIDE_MARGIN = 96;
const GUEST_FIELD_ORDER = ['Guest DJ', 'Guest MC'];

const els = {
  picker: document.getElementById('showPicker'),
  format: document.getElementById('formatPicker'),
  layout: document.getElementById('layoutPicker'),
  title: document.getElementById('titleInput'),
  dj: document.getElementById('djInput'),
  date: document.getElementById('dateInput'),
  start: document.getElementById('startInput'),
  end: document.getElementById('endInput'),
  editor: document.querySelector('.editor'),
  edit: document.getElementById('editBtn'),
  upload: document.getElementById('uploadInput'),
  guest: document.getElementById('guestInput'),
  render: document.getElementById('renderBtn'),
  download: document.getElementById('downloadBtn'),
  canvas: document.getElementById('c')
};

const ctx = els.canvas.getContext('2d', { alpha: false });
const dateFormatter = new Intl.DateTimeFormat('en-GB', {
  weekday: 'short',
  day: 'numeric',
  month: 'short'
});

let shows = [];
let bgSource = null;
let bgUrl = '';
let renderToken = 0;

function selectedShow(){
  if(els.picker.value === '') return null;
  return shows[Number(els.picker.value)] || null;
}

function updateRenderState(){
  els.render.disabled = !bgSource || !els.title.value.trim();
}

function currentFormat(){
  return FORMATS[els.format.value] || FORMATS.square;
}

function currentLayout(format){
  return format[els.layout.value] || format.lower;
}

function updateCanvasSize(){
  const format = currentFormat();
  if(els.canvas.width !== format.width || els.canvas.height !== format.height){
    els.canvas.width = format.width;
    els.canvas.height = format.height;
  }
  updateRenderState();
}

function invalidateArtwork(){
  renderToken++;
  els.download.disabled = true;
  updateCanvasSize();
}

function setEditorOpen(open){
  els.editor.hidden = !open;
  els.edit.setAttribute('aria-expanded', String(open));
  els.edit.textContent = open ? 'Hide edit tools' : 'Edit info';
}

function formatShowDate(value){
  const date = new Date(value);
  return Number.isNaN(date.getTime()) ? '' : dateFormatter.format(date);
}

function toDateInputValue(value){
  const date = new Date(value);
  if(Number.isNaN(date.getTime())) return '';
  const offset = date.getTimezoneOffset() * 60000;
  return new Date(date.getTime() - offset).toISOString().slice(0,10);
}

function splitTimeRange(range){
  const [start = '', end = ''] = String(range || '').split('-').map(t=>t.trim());
  return { start, end };
}

function normalizeFieldName(value){
  return String(value || '').toLowerCase().replace(/[^a-z0-9]+/g,'');
}

function normalizeGuestValue(value){
  return String(value || '').trim();
}

function isGuestField(key){
  const normalizedKey = normalizeFieldName(key);
  return normalizedKey.includes('guest') ||
    normalizedKey === 'featuring' ||
    normalizedKey === 'feat';
}

function getShowGuest(show){
  if(!show) return '';
  const orderedGuests = GUEST_FIELD_ORDER
    .map(field=>normalizeGuestValue(show[field]))
    .filter(Boolean);
  const otherGuests = Object.entries(show)
    .filter(([key,value])=>value && isGuestField(key) && !GUEST_FIELD_ORDER.includes(key))
    .map(([,value])=>normalizeGuestValue(value))
    .filter(Boolean);
  const guests = [...orderedGuests, ...otherGuests];
  return [...new Set(guests.map(guest=>guest.toLowerCase()))]
    .map(guestKey=>guests.find(guest=>guest.toLowerCase() === guestKey))
    .join(' + ');
}

function getArtworkInfo(){
  return {
    title: els.title.value.trim(),
    dj: els.dj.value.trim(),
    date: els.date.value,
    start: els.start.value,
    end: els.end.value,
    guest: els.guest.value.trim()
  };
}

function populateEditor(show){
  if(!show) return;
  const times = splitTimeRange(show['A-B']);
  els.title.value = show['Now Playing'] || '';
  els.dj.value = show.DJ || '';
  els.date.value = toDateInputValue(show.Date);
  els.start.value = times.start;
  els.end.value = times.end;
  els.guest.value = getShowGuest(show);
}

/* ===========================
   LOAD SHOW DATA
=========================== */
async function loadShows(){
  try{
    const res = await fetch(SHOWS_URL);
    if(!res.ok) throw new Error(`Show fetch failed: ${res.status}`);
    shows = await res.json();
  }catch(e){
    shows=[];
  }

  const placeholder = new Option(shows.length ? 'Select a show or edit manually' : 'Enter show info manually', '', true, true);
  placeholder.disabled = true;
  els.picker.replaceChildren(placeholder);
  const options = document.createDocumentFragment();
  shows.forEach((s,i)=>{
    const opt = document.createElement('option');
    opt.value=i;
    opt.textContent =
      `${formatShowDate(s.Date)} — ${s['Now Playing'] || 'Untitled show'}`;
    options.appendChild(opt);
  });
  els.picker.appendChild(options);
  els.picker.disabled = shows.length === 0;
  updateRenderState();
}

function clearBackground(){
  if(bgSource && typeof bgSource.close === 'function') bgSource.close();
  if(bgUrl) URL.revokeObjectURL(bgUrl);
  bgSource = null;
  bgUrl = '';
}

function loadImageElement(src){
  return new Promise((resolve,reject)=>{
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = reject;
    img.src = src;
  }).then(async img=>{
    if(img.decode){
      try{ await img.decode(); }catch(e){}
    }
    return img;
  });
}

async function decodeUpload(file){
  bgUrl = URL.createObjectURL(file);
  if('createImageBitmap' in window){
    try{
      const bitmap = await createImageBitmap(file, { imageOrientation: 'from-image' });
      URL.revokeObjectURL(bgUrl);
      bgUrl = '';
      return bitmap;
    }catch(e){}
  }
  return loadImageElement(bgUrl);
}

els.upload.addEventListener('change',async e=>{
  const f = e.target.files[0];
  if(!f) return;
  const token = ++renderToken;
  els.render.disabled = true;
  els.download.disabled = true;
  clearBackground();

  try{
    bgSource = await decodeUpload(f);
  }catch(e){
    clearBackground();
  }

  if(token === renderToken) updateRenderState();
});

els.picker.addEventListener('change',()=>{
  populateEditor(selectedShow());
  invalidateArtwork();
});
els.format.addEventListener('change',invalidateArtwork);
els.layout.addEventListener('change',invalidateArtwork);
els.title.addEventListener('input',invalidateArtwork);
els.dj.addEventListener('input',invalidateArtwork);
els.date.addEventListener('input',invalidateArtwork);
els.start.addEventListener('input',invalidateArtwork);
els.end.addEventListener('input',invalidateArtwork);
els.guest.addEventListener('input',invalidateArtwork);
els.edit.addEventListener('click',()=>{
  setEditorOpen(els.edit.getAttribute('aria-expanded') !== 'true');
});
els.render.addEventListener('click',drawArtwork);

/* ===========================
   HELPERS
=========================== */
function to12h(time){
  if(!time) return '';
  const [h,m] = time.split(':').map(Number);
  if(Number.isNaN(h)) return time;
  const hr = ((h + 11) % 12) + 1;
  return `${hr}${m ? ':'+m.toString().padStart(2,'0') : ''}${h >= 12 ? 'pm' : 'am'}`;
}

function formatTimeRange(range){
  const [startRaw = '', endRaw = ''] = String(range || '').split('-').map(t=>t.trim());
  const start = to12h(startRaw);
  const end = to12h(endRaw);
  return end ? `${start} → ${end}` : start;
}

function formatEditedDate(value){
  if(!value) return '';
  const [year,month,day] = value.split('-').map(Number);
  if(!year || !month || !day) return '';
  return dateFormatter.format(new Date(year, month - 1, day));
}

function formatEditedTimeRange(start,end){
  const startLabel = to12h(start);
  const endLabel = to12h(end);
  return endLabel ? `${startLabel} → ${endLabel}` : startLabel;
}

function drawCoverImage(ctx,img,w,h){
  const iw = img.naturalWidth || img.width;
  const ih = img.naturalHeight || img.height;
  const scale = Math.max(w/iw, h/ih);
  const sw = w/scale;
  const sh = h/scale;

  ctx.drawImage(
    img,
    (iw - sw)/2,
    (ih - sh)/2,
    sw, sh,
    0, 0, w, h
  );
}

function drawInfoBubble(ctx,x,y,w,h){
  ctx.save();
  const radius = 14;
  const surface = ctx.createLinearGradient(x, y, x, y + h);
  surface.addColorStop(0,'rgba(255,255,255,0.30)');
  surface.addColorStop(1,'rgba(255,255,255,0.18)');

  ctx.shadowColor='rgba(0,0,0,0.14)';
  ctx.shadowBlur=12;
  ctx.shadowOffsetY=4;
  ctx.fillStyle=surface;
  ctx.beginPath();
  ctx.roundRect(x,y,w,h,radius);
  ctx.fill();

  ctx.shadowColor='rgba(0,0,0,0)';
  ctx.strokeStyle='rgba(255,255,255,0.46)';
  ctx.lineWidth=1.4;
  ctx.stroke();

  ctx.globalAlpha=0.62;
  ctx.strokeStyle='rgba(255,255,255,0.58)';
  ctx.lineWidth=1;
  ctx.beginPath();
  ctx.roundRect(x + 1.5, y + 1.5, w - 3, h - 3, radius - 2);
  ctx.stroke();
  ctx.restore();
}

function clamp(value,min,max){
  return Math.max(min, Math.min(value, max));
}

/* scale both lines together */
function scaleFontsToFit(ctx, primaryText, secondaryText, maxTextWidth){
  ctx.font = '64px MeshFont';
  const primaryW = ctx.measureText(primaryText).width;

  ctx.font = '42px MeshFont';
  const secondaryW = secondaryText ? ctx.measureText(secondaryText).width : 0;

  const widest = Math.max(primaryW, secondaryW);

  if(widest <= maxTextWidth){
    return { primarySize: 64, secondarySize: 42 };
  }

  const scale = maxTextWidth / widest;
  return {
    primarySize: Math.floor(64 * scale),
    secondarySize: Math.floor(42 * scale)
  };
}

/* ===========================
   DRAW POST
=========================== */
async function drawArtwork(){
  const info = getArtworkInfo();
  if(!info.title || !bgSource) return;
  updateCanvasSize();

  const token = ++renderToken;
  els.render.disabled = true;
  els.download.disabled = true;

  if(document.fonts && document.fonts.ready) await document.fonts.ready;
  if(token !== renderToken) return;

  const format = currentFormat();
  const layout = currentLayout(format);
  const cw = format.width;
  const ch = format.height;
  const maxPillWidth = cw - (SIDE_MARGIN * 2);
  const maxTextW = maxPillWidth - (PILL_PADDING_X * 2);

  ctx.clearRect(0,0,cw,ch);
  drawCoverImage(ctx,bgSource,cw,ch);

  const title = info.title;

  const showEqualsDJ =
    info.dj &&
    title.trim().toLowerCase() === info.dj.trim().toLowerCase();

  let primaryLine = title;
  let secondaryLine = '';

  if(showEqualsDJ){
    if(info.guest) primaryLine = `${title} + ${info.guest}`;
  } else {
    secondaryLine = [info.dj, info.guest].filter(Boolean).join(' + ');
  }

  const dateStr = formatEditedDate(info.date);
  const timeStr = formatEditedTimeRange(info.start, info.end);

  /* === MAIN PILL SCALING === */
  const sizes = scaleFontsToFit(ctx, primaryLine, secondaryLine, maxTextW);

  // Measure widths using the scaled sizes
  ctx.font = `${sizes.primarySize}px MeshFont`;
  const primaryW = ctx.measureText(primaryLine).width;

  ctx.font = `${sizes.secondarySize}px MeshFont`;
  const secondaryW = secondaryLine ? ctx.measureText(secondaryLine).width : 0;

  let pillW = Math.max(primaryW, secondaryW) + (PILL_PADDING_X * 2);
  let pillX = layout.x;

  if(pillW > maxPillWidth){
    pillW = maxPillWidth;
    pillX = (cw - pillW) / 2;
  }

  const pillHeight = secondaryLine ? 140 : 92;
  const pillY = clamp(layout.titleY, format.safeTop + 24, ch - format.safeBottom - 260);

  drawInfoBubble(ctx, pillX, pillY, pillW, pillHeight);

  /* ✅ CENTER THE WHOLE TEXT BLOCK AS ONE UNIT (iOS-safe) */
  const centerY = pillY + (pillHeight / 2);

  // Approximate line “visual height” from font sizes (stable across browsers)
  const primaryH = sizes.primarySize * 0.95;
  const secondaryH = sizes.secondarySize * 0.95;

  // Gap between lines (scales with text, and stays consistent on iOS)
  const gap = secondaryLine ? Math.max(10, Math.round(sizes.secondarySize * 0.35)) : 0;

  const blockH = secondaryLine ? (primaryH + gap + secondaryH) : primaryH;
  const blockTop = centerY - (blockH / 2);

  const primaryY = blockTop + (primaryH / 2);
  const secondaryY = blockTop + primaryH + gap + (secondaryH / 2);

  ctx.fillStyle = '#fff';
  ctx.textBaseline = 'middle';
  ctx.textAlign = 'left';

  ctx.font = `${sizes.primarySize}px MeshFont`;
  ctx.fillText(primaryLine, pillX + PILL_PADDING_X, secondaryLine ? primaryY : centerY);

  if(secondaryLine){
    ctx.globalAlpha = 0.75;
    ctx.font = `${sizes.secondarySize}px MeshFont`;
    ctx.fillText(secondaryLine, pillX + PILL_PADDING_X, secondaryY);
    ctx.globalAlpha = 1;
  }

  /* === DATE / TIME PILLS === */
  const preferredDateY = (showEqualsDJ
    ? layout.dateY - DJ_LINE_OFFSET
    : layout.dateY) + PILL_VERTICAL_GAP;
  const dateY = clamp(
    preferredDateY,
    pillY + pillHeight + PILL_VERTICAL_GAP,
    ch - format.safeBottom - 96
  );

  ctx.font='32px MeshFont';
  const startX = pillX;
  const infoPills = [dateStr, timeStr].filter(Boolean);
  let nextX = startX;

  infoPills.forEach((text,index)=>{
    const pillW = ctx.measureText(text).width + 40;
    if(index > 0) nextX += DATE_TIME_GAP;
    drawInfoBubble(ctx, nextX, dateY, pillW, 52);
    ctx.fillStyle='#fff';
    ctx.textBaseline='middle';
    ctx.textAlign='center';
    ctx.fillText(text, nextX + pillW/2, dateY + 26);
    nextX += pillW;
  });

  ctx.textAlign='left';
  ctx.fillStyle='rgba(255,255,255,0.75)';
  ctx.font='26px MeshFont';
  ctx.fillText('meshradio.live', startX, infoPills.length ? dateY + 70 : pillY + pillHeight + 44);

  els.edit.hidden=false;
  els.download.disabled=false;
  updateRenderState();
}

/* ===========================
   DOWNLOAD (SAFE)
=========================== */
els.download.addEventListener('click',async () => {
  const blob = await new Promise(r => els.canvas.toBlob(r,'image/png'));
  if(!blob) return;
  const info = getArtworkInfo();
  const format = currentFormat();
  const title = String(info.title || 'mesh').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
  const filename = `mesh-${title || 'artwork'}-${format.label}.png`;

  const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);

  if(!isIOS){
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
    setTimeout(()=>URL.revokeObjectURL(a.href),1000);
    return;
  }

  const file = new File([blob], filename, { type:'image/png' });
  if(navigator.canShare && navigator.canShare({ files:[file] })){
    try{ await navigator.share({ files:[file] }); return; }catch(e){}
  }

  const url = URL.createObjectURL(blob);
  window.open(url,'_blank');
  setTimeout(()=>URL.revokeObjectURL(url),60000);
});

setEditorOpen(false);
loadShows();
</script>
</body>
</html>
